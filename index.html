<!DOCTYPE html>
<html>
<head>
    
    <title>Moodify</title>
    <link rel="stylesheet" href="Moodify.css">
    

</head>
<body>
    <div id="container">
        <h1>Moodify</h1>
        <p>How are you feeling today?</p>
        <button id="themeToggle">Dark Mode</button>
        <div class="mood-container">
            <div class="mood-cards" data-mood="Happy">
                <!-- <div class="icon"></div> -->
                <h3>Happy</h3>
                <p>Good vibe only</p>
           </div>

           <div class="mood-cards" data-mood="Workout">
                <h3>Workout</h3>
                <p>Energy boost</p>
           </div>

           <div class="mood-cards" data-mood="Sad">
                <h3>Sad</h3>
                <p>Need comfort songs</p>
           </div>

           <div class="mood-cards" data-mood="Chill">
                <h3>Chill</h3>
                <p>Relax ans unwind</p>
           </div>

           <div class="mood-cards" data-mood="Focus">
                <h3>Focus</h3>
                <p>Deep work mode</p>
           </div>

           <div class="mood-cards" data-mood="Its Complicated">
                <h3>Its complicated</h3>
                <p>overthinking about overthinking</p>
           </div>

        </div>

        <div class="playlist-section">
            <h2>Recommended Playlist</h2>
            <div id="playlist">
                <p>Select a mood to  discover songs</p>
            </div>
        </div>

    </div>

    
<script src="Moodify.js"></script>    
    
</body>
</html>
